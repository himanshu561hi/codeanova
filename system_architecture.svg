<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#f8fafc"/>

  <!-- User / Client Section -->
  <rect x="50" y="250" width="120" height="100" rx="12" fill="#2563eb" fill-opacity="0.1" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="300" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-weight="bold" font-size="14">User / Browser</text>
  <path d="M120 315 L100 335 M100 315 L120 335" stroke="#1e40af" stroke-width="2" stroke-linecap="round"/>

  <!-- Frontend (React) -->
  <rect x="250" y="100" width="180" height="80" rx="12" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="2"/>
  <text x="340" y="140" text-anchor="middle" fill="#4338ca" font-family="Arial, sans-serif" font-weight="bold" font-size="14">React Frontend (Vite)</text>
  <text x="340" y="160" text-anchor="middle" fill="#4338ca" font-family="Arial, sans-serif" font-size="10">Tailwind CSS 4 | Axios</text>

  <!-- Backend (Node.js/Express) -->
  <rect x="250" y="250" width="180" height="100" rx="12" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
  <text x="340" y="290" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-weight="bold" font-size="14">Express Backend</text>
  <text x="340" y="310" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="10">Node.js | JWT | CSRF</text>
  <text x="340" y="330" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="10">Node-Cron Service</text>

  <!-- Database (MongoDB) -->
  <rect x="250" y="420" width="180" height="80" rx="12" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="340" y="460" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-weight="bold" font-size="14">MongoDB Atlas</text>
  <text x="340" y="480" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-size="10">Mongoose ODM</text>

  <!-- Third Party Services -->
  <rect x="550" y="100" width="200" height="400" rx="16" fill="#f59e0b" fill-opacity="0.05" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="650" y="130" text-anchor="middle" fill="#b45309" font-family="Arial, sans-serif" font-weight="bold" font-size="16">External Ecosystem</text>

  <!-- External Service Boxes -->
  <rect x="570" y="160" width="160" height="60" rx="8" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="650" y="195" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="12">Google Slides (Certificates)</text>
  
  <rect x="570" y="240" width="160" height="60" rx="8" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="650" y="275" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="12">Razorpay (Payments)</text>
  
  <rect x="570" y="320" width="160" height="60" rx="8" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="650" y="355" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="12">Cloudinary (Storage)</text>

  <rect x="570" y="400" width="160" height="60" rx="8" fill="white" stroke="#d97706" stroke-width="1"/>
  <text x="650" y="435" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="12">Nodemailer (Gmail)</text>

  <!-- Connections -->
  <!-- User to Frontend -->
  <path d="M170 280 L250 140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="200" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Interacts</text>

  <!-- Frontend to Backend -->
  <path d="M340 180 L340 250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="215" fill="#64748b" font-family="Arial, sans-serif" font-size="10">API Requests (Axios)</text>

  <!-- Backend to DB -->
  <path d="M340 350 L340 420" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="385" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Queries (Mongoose)</text>

  <!-- Backend to External -->
  <path d="M430 300 L550 300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="290" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Integrations</text>

  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
